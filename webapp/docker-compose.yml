version: '3.8'

services:
  blindnav-webapp:
    build: .
    container_name: blindnav-webapp
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
