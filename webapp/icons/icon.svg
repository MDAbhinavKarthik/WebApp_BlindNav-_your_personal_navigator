<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64b5f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#42a5f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGradient)"/>
  
  <!-- Compass/Navigation Circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#iconGradient)" stroke-width="12"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#iconGradient)" stroke-width="4" opacity="0.5"/>
  
  <!-- Navigation Arrow (pointing up) -->
  <path d="M256 100 L320 280 L256 240 L192 280 Z" fill="url(#iconGradient)"/>
  
  <!-- Sound Waves -->
  <path d="M380 200 Q420 256 380 312" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
  <path d="M400 170 Q460 256 400 342" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <path d="M420 140 Q500 256 420 372" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  
  <!-- Center dot -->
  <circle cx="256" cy="256" r="20" fill="#fff"/>
  
  <!-- Plus symbol for BlindNav+ -->
  <rect x="440" y="390" width="50" height="12" rx="6" fill="#4caf50"/>
  <rect x="459" y="371" width="12" height="50" rx="6" fill="#4caf50"/>
</svg>
