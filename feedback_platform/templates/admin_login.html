<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class='admin-page'>
    <nav>
        <ul>
            <li><a href="{{ url_for('index') }}">Home</a></li>
            <li><a href="{{ url_for('admin_login') }}">Admin Login</a></li>
            <li><a href="{{ url_for('student_login') }}">Student Login</a></li>
            <li><a href="{{ url_for('parent_login') }}">Parent Login</a></li>
            <li><a href="{{ url_for('parent_login') }}">Teacher Login</a></li>
        </ul>
    </nav>
    <div class="container">
        {% block content %}
        <img src="{{ url_for('static', filename='images/admin_icon.png') }}" alt="Admin Icon">
    <h1>Admin Login</h1>
    <form method="post" action="{{ url_for('admin_dashboard') }}">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
        
        <button type="submit">Login</button>
    </form>
    <!-- Content of each page will be inserted here -->
    {% endblock %}
    </div>
</body>
</html>
